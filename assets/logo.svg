<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f4e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00d4ff" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)" />

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40" />
    <line x1="0" y1="80" x2="800" y2="80" />
    <line x1="0" y1="120" x2="800" y2="120" />
    <line x1="0" y1="160" x2="800" y2="160" />
    <line x1="100" y1="0" x2="100" y2="200" />
    <line x1="200" y1="0" x2="200" y2="200" />
    <line x1="300" y1="0" x2="300" y2="200" />
    <line x1="400" y1="0" x2="400" y2="200" />
    <line x1="500" y1="0" x2="500" y2="200" />
    <line x1="600" y1="0" x2="600" y2="200" />
    <line x1="700" y1="0" x2="700" y2="200" />
  </g>

  <!-- Shield icon -->
  <g transform="translate(40, 35)" filter="url(#shadow)">
    <!-- Shield shape -->
    <path d="M55 10 L100 30 L100 80 Q100 120 55 135 Q10 120 10 80 L10 30 Z"
          fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.9"/>
    <!-- Inner shield -->
    <path d="M55 22 L90 38 L90 78 Q90 110 55 123 Q20 110 20 78 L20 38 Z"
          fill="#00d4ff" fill-opacity="0.08" stroke="none"/>
    <!-- Magnifying glass -->
    <circle cx="55" cy="70" r="22" fill="none" stroke="#00d4ff" stroke-width="2.5" filter="url(#glow)"/>
    <line x1="71" y1="86" x2="88" y2="103" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Scan lines inside magnifier -->
    <line x1="40" y1="62" x2="70" y2="62" stroke="#7b2ff7" stroke-width="1" opacity="0.6"/>
    <line x1="40" y1="70" x2="70" y2="70" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
    <line x1="40" y1="78" x2="70" y2="78" stroke="#7b2ff7" stroke-width="1" opacity="0.6"/>
    <!-- Binary dots -->
    <circle cx="46" cy="62" r="1.5" fill="#00d4ff"/>
    <circle cx="55" cy="62" r="1.5" fill="#00d4ff"/>
    <circle cx="64" cy="62" r="1.5" fill="#00d4ff"/>
    <circle cx="46" cy="70" r="1.5" fill="#7b2ff7"/>
    <circle cx="55" cy="70" r="1.5" fill="#7b2ff7"/>
    <circle cx="64" cy="70" r="1.5" fill="#7b2ff7"/>
    <circle cx="46" cy="78" r="1.5" fill="#00d4ff"/>
    <circle cx="55" cy="78" r="1.5" fill="#00d4ff"/>
    <circle cx="64" cy="78" r="1.5" fill="#00d4ff"/>
  </g>

  <!-- Title text -->
  <text x="180" y="95" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace" font-size="48" font-weight="700" fill="url(#accent)" filter="url(#glow)">
    scan_node
  </text>

  <!-- Version badge -->
  <rect x="180" y="110" width="48" height="22" rx="11" fill="#7b2ff7" fill-opacity="0.3" stroke="#7b2ff7" stroke-width="1"/>
  <text x="204" y="126" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#c4a6ff" text-anchor="middle">v3.0</text>

  <!-- Subtitle -->
  <text x="238" y="126" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace" font-size="12" fill="#8892b0">
    Defensive SQL Injection Scanner
  </text>

  <!-- Tagline -->
  <text x="180" y="155" font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" fill="#5a6380">
    Zero dependencies  &#x2022;  Node.js 18+  &#x2022;  OWASP WSTG Aligned  &#x2022;  MIT License
  </text>

  <!-- Decorative accent line -->
  <rect x="180" y="170" width="120" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
</svg>
